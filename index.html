    <style>
        body {
            /* Transition for smooth theme switching */
            transition: background-image 0.5s ease, background-color 0.5s ease, color 0.5s ease;

        /* --- NOISE TEXTURE --- */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03; /* Subtle texture */

        }
        
        /* Dark mode needs slightly less noise opacity to not look dusty */
        .dark .noise-overlay {
            opacity: 0.04;
            mix-blend-mode: overlay;
        }

        /* --- BACKGROUND CANVAS ENGINE --- */
        #background-canvas {
            position: fixed; /* Fixed to cover entire screen */
            top: 0;

            width: 100%;
            height: 100%;
            z-index: 0; 
            pointer-events: none;

        .glass-panel {
            /* Adaptive Glass: Light Mode vs Dark Mode */
            background: rgba(255, 255, 255, 0.6); /* Light Mode Base */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            transition: background-color 0.5s, border-color 0.5s;
        }

        /* Dark Mode Override for Glass */
        .dark .glass-panel {
            background: rgba(23, 24, 25, 0.6); /* Even more transparent to show depth */
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- RAINDROP EFFECT (LIQUID GLASS) --- */
        .raindrop {
            /* Base Transparency & Blur */
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            /* Shape */
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            
            /* The Volume Shadows (Simulating Surface Tension) */
            box-shadow: 
                /* Outer drop shadow (Distance from surface) */
                4px 4px 10px rgba(0, 0, 0, 0.1),
                /* Top-Left Specular Highlight (Light source) */
                inset 2px 2px 5px rgba(255, 255, 255, 0.6),
                /* Bottom-Right Inner Shadow (Density) */
                inset -2px -2px 5px rgba(0, 0, 0, 0.1);
                
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Dark Mode Raindrop Adjustment */
        .dark .raindrop {
            background: rgba(0, 0, 0, 0.2); /* Darker interior */
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                4px 4px 12px rgba(0, 0, 0, 0.5), /* Deeper shadow */
                inset 1px 1px 4px rgba(255, 255, 255, 0.2), /* Subtle highlight */
                inset -2px -2px 6px rgba(0, 0, 0, 0.4); /* Deep inner shadow */
        }

        /* Hover State: Swell & Catch Light */
        .raindrop:hover {
            transform: translateY(-2px) scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 
                6px 10px 20px rgba(0, 0, 0, 0.15),
                inset 3px 3px 6px rgba(255, 255, 255, 0.8), /* Brighter highlight */
                inset -2px -2px 6px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .dark .raindrop:hover {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 
                6px 10px 20px rgba(0, 0, 0, 0.6),
                inset 2px 2px 8px rgba(255, 255, 255, 0.3),
                inset -2px -2px 8px rgba(0, 0, 0, 0.5);
        }

        /* --- LIQUID BUTTON ANIMATION --- */
        .btn-save-liquid {

        .btn-save-liquid::before {

            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);

        .hero-mask-mobile {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);

    <script>
        // Init Icons
        lucide.createIcons();

        // -------------------------------
        // THEME MANAGEMENT
        // -------------------------------
        const html = document.documentElement;
        
        // Check local storage or system preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }

        function toggleTheme() {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
            // Update canvas blending for new theme
            if(window.animate) requestAnimationFrame(animate); 
        }

        // -------------------------------
        // CANVAS ANIMATION ENGINE (CHROMA + WAVES)
        // -------------------------------
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, blobs = [], time = 0;

        // Cynimod Palette
        const palette = [
            {r: 241, g: 184, b: 27},  // Gold
            {r: 230, g: 122, b: 111}, // Coral
            {r: 23, g: 44, b: 84},    // Navy
            {r: 33, g: 212, b: 253}   // Cyan Accent
        ];

        class Blob {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.8; 
                this.vy = (Math.random() - 0.5) * 0.8;
                this.r = Math.random() * 300 + 100; // Large, ambient blobs
                this.color = palette[Math.floor(Math.random() * palette.length)];
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < -200 || this.x > width + 200) this.vx *= -1;
                if (this.y < -200 || this.y > height + 200) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
                g.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.5)`);
                g.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
                ctx.fillStyle = g;
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawWaves() {
            const isDark = html.classList.contains('dark');
            ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(23, 44, 84, 0.05)';
            ctx.lineWidth = 1;
            
            // Draw 3 layers of waves
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                for (let x = 0; x < width; x+=5) {
                    // Sine wave logic: y = center + amplitude * sin(frequency * x + phase)
                    const y = (height / 2) + 
                              (height / 4) * Math.sin((x * 0.002) + (time * 0.002) + (i * 1.5)) + 
                              (i * 100); // Offset each wave
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            blobs = [];
            // Create fewer blobs for mobile to save battery
            const blobCount = width < 768 ? 4 : 7;
            for(let i=0; i<blobCount; i++) blobs.push(new Blob());
        }

        function animate() {
            time++; // Increment time for waves
            ctx.clearRect(0, 0, width, height);
            
            // ADAPTIVE BLENDING
            const isDark = html.classList.contains('dark');
            
            // 1. Draw Blobs (Background Layer)
            ctx.globalCompositeOperation = isDark ? 'screen' : 'multiply';
            blobs.forEach(b => { b.update(); b.draw(); });
            
            // 2. Draw Waves (Overlay Layer)
            ctx.globalCompositeOperation = 'source-over';
            drawWaves();
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

        // -------------------------------
        // ACTIONS
        // -------------------------------
        function downloadVCard() {
            const name = "Dominic Frimpong";
            const vCardData = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nORG:Cynimod\nTITLE:Founder\nEMAIL:info@cynimod.com\nTEL:+233550386888\nEND:VCARD`;
            const blob = new Blob([vCardData], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name.replace(' ', '_')}.vcf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
        
        function shareProfile() {
            if (navigator.share) {
                navigator.share({
                    title: 'Dominic Frimpong | Cynimod',
                    text: 'Check out this profile.',
                    url: window.location.href
                });
            } else {
                alert("Link copied to clipboard!");
            }
        }
    </script>
