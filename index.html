    <script>
        // Init Icons
        lucide.createIcons();

        // -------------------------------
        // SCROLL REVEAL OBSERVER
        // -------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };

            const footerObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target); // Reveal once
                    }
                });
            }, observerOptions);

            const footer = document.querySelector('.reveal-footer');
            if (footer) footerObserver.observe(footer);
        });

        // -------------------------------
        // TYPING ANIMATION (HEADER)
        // -------------------------------
        const greetings = ["Welcome", "Akwaaba", "Woezor", "Obaake", "Bienvenue"];
        const typingElement = document.getElementById('typing-text');
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 100;

        function type() {
            const currentWord = greetings[wordIndex];
            
            if (isDeleting) {
                typingElement.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
                typeSpeed = 50; 
            } else {
                typingElement.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
                typeSpeed = 150; 
            }

            if (!isDeleting && charIndex === currentWord.length) {
                isDeleting = true;
                typeSpeed = 2000; // Pause at end
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % greetings.length;
                typeSpeed = 500; 
            }

            setTimeout(type, typeSpeed);
        }

        // -------------------------------
        // TYPING ANIMATION (BIO)
        // -------------------------------
        const bioText = "We empower SMEs and institutions to establish and amplify their brands in Ghana.";
        const bioElement = document.getElementById('bio-text');
        let bioIndex = 0;

        function typeBio() {
            if (bioIndex < bioText.length) {
                bioElement.textContent += bioText.charAt(bioIndex);
                bioIndex++;
                setTimeout(typeBio, 35); // Typing speed for bio
            } else {
                bioElement.classList.remove('typing'); // Stop blinking cursor
                bioElement.classList.add('typing-done');
            }
        }

        // Start typing animations on load
        document.addEventListener('DOMContentLoaded', () => {
            type(); // Start cycling header
            setTimeout(typeBio, 1200); // Start bio typing after slide-in
        });

        // -------------------------------
        // THEME MANAGEMENT
        // -------------------------------
        const html = document.documentElement;
        
        // Check local storage or system preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }

        function toggleTheme() {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
            // Update canvas blending for new theme
            if(window.animate) requestAnimationFrame(animate); 
        }

        // -------------------------------
        // CANVAS ANIMATION ENGINE (CHROMA + WAVES)
        // -------------------------------
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, blobs = [], time = 0;

        // Cynimod Palette
        const palette = [
            {r: 241, g: 184, b: 27},  // Gold
            {r: 230, g: 122, b: 111}, // Coral
            {r: 23, g: 44, b: 84},    // Navy
            {r: 33, g: 212, b: 253}   // Cyan Accent
        ];

        class Blob {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.8; 
                this.vy = (Math.random() - 0.5) * 0.8;
                this.r = Math.random() * 300 + 100; // Large, ambient blobs
                this.color = palette[Math.floor(Math.random() * palette.length)];
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < -200 || this.x > width + 200) this.vx *= -1;
                if (this.y < -200 || this.y > height + 200) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
                g.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.5)`);
                g.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
                ctx.fillStyle = g;
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawWaves() {
            const isDark = html.classList.contains('dark');
            ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(23, 44, 84, 0.05)';
            ctx.lineWidth = 1;
            
            // Draw 3 layers of waves
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                for (let x = 0; x < width; x+=5) {
                    // Sine wave logic: y = center + amplitude * sin(frequency * x + phase)
                    const y = (height / 2) + 
                              (height / 4) * Math.sin((x * 0.002) + (time * 0.002) + (i * 1.5)) + 
                              (i * 100); // Offset each wave
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            blobs = [];
            // Create fewer blobs for mobile to save battery
            const blobCount = width < 768 ? 4 : 7;
            for(let i=0; i<blobCount; i++) blobs.push(new Blob());
        }

        function animate() {
            time++; // Increment time for waves
            ctx.clearRect(0, 0, width, height);
            
            // ADAPTIVE BLENDING
            const isDark = html.classList.contains('dark');
            
            // 1. Draw Blobs (Background Layer)
            ctx.globalCompositeOperation = isDark ? 'screen' : 'multiply';
            blobs.forEach(b => { b.update(); b.draw(); });
            
            // 2. Draw Waves (Overlay Layer)
            ctx.globalCompositeOperation = 'source-over';
            drawWaves();
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

        // -------------------------------
        // ACTIONS
        // -------------------------------
        function downloadVCard() {
            const btn = document.getElementById('saveBtn');
            const btnText = document.getElementById('saveBtnText');
            const originalText = btnText.innerText;
            
            // Visual Feedback
            btnText.innerText = "Saving...";
            
            const name = "Dominic Frimpong";
            // RFC 6350 VCard 3.0 Format
            // Ensure proper newlines (\r\n) and field separation
            const vCardData = 
`BEGIN:VCARD
VERSION:3.0
N:Frimpong;Dominic;;;
FN:Dominic Frimpong
ORG:Cynimod
TITLE:Managing Director & Creative Lead
EMAIL;type=INTERNET;type=WORK:dominic@cynimod.com
TEL;type=CELL:+233559348703
URL:https://cynimod.com
END:VCARD`;

            try {
                const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'Dominic_Frimpong.vcf';
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    btnText.innerText = originalText; // Reset text
                }, 2000);
            } catch (e) {
                console.error("VCard Download Failed:", e);
                // Fallback for some older mobile browsers if Blob fails (less likely now but possible)
                window.open('data:text/vcard;charset=utf-8,' + encodeURIComponent(vCardData));
                btnText.innerText = originalText;
            }
        }
        
        function shareProfile() {
            if (navigator.share) {
                navigator.share({
                    title: 'Dominic Frimpong | Cynimod',
                    text: 'Check out this profile.',
                    url: window.location.href
                });
            } else {
                alert("Link copied to clipboard!");
            }
        }
    </script>
